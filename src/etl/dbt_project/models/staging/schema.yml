version: 2

models:
  - name: stg_sales_clean
    description: "Cleaned and deduplicated sales facts (1M rows materialized as table)"
    columns:
      - name: sale_id
        description: "Unique sales transaction identifier"
        tests:
          - unique
          - not_null
      - name: store_id
        description: "Store identifier (foreign key)"
        tests:
          - not_null
      - name: product_id
        description: "Product identifier (foreign key)"
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier (foreign key to loyalty members, nullable for anonymous sales)"
      - name: sale_date
        description: "Date of sale transaction"
        tests:
          - not_null
      - name: quantity
        description: "Units sold (positive only, null for cancelled/invalid)"
        tests:
          - not_null
      - name: unit_price
        description: "Unit price in dollars"
        tests:
          - not_null
      - name: total_amount
        description: "Total sale amount before discount"
        tests:
          - not_null
      - name: discount_pct
        description: "Discount percentage (0-100)"
        tests:
          - not_null
      - name: net_amount
        description: "Amount after discount"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used"
        tests:
          - not_null
      - name: is_return
        description: "Flag indicating if transaction is a return"
        tests:
          - not_null

  - name: stg_customer_clean
    description: "Cleaned customer master data with loyalty status"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: loyalty_member
        description: "Loyalty member status (true/false)"
        tests:
          - not_null
      - name: country
        description: "Customer country"
        tests:
          - not_null

  - name: stg_date_clean
    description: "Cleaned date dimension"
    columns:
      - name: date_id
        description: "Date identifier in YYYYMMDD format"
        tests:
          - unique
          - not_null
      - name: date_value
        description: "Actual date value"
        tests:
          - not_null

  - name: stg_product_clean
    description: "Cleaned product master data"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Product name"
        tests:
          - not_null
      - name: category
        description: "Product category"
        tests:
          - not_null
      - name: list_price
        description: "List price in dollars"
        tests:
          - not_null

  - name: stg_store_clean
    description: "Cleaned store master data with regional hierarchy"
    columns:
      - name: store_id
        description: "Unique store identifier"
        tests:
          - unique
          - not_null
      - name: store_name
        description: "Store name"
        tests:
          - not_null
      - name: region
        description: "Geographic region"
        tests:
          - not_null
      - name: status
        description: "Store operational status"
        tests:
          - not_null
