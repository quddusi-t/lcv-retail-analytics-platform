
# Name your project! Project names should be lowercase and use underscores as separators
# See https://docs.getdbt.com/docs/build/projects
name: 'lcv_retail_analytics'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'lcv_retail_analytics'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  lcv_retail_analytics:
    staging:
      description: "Staging models from raw BigQuery tables"
      materialized: view
      +schema: staging
    marts:
      description: "Analytics mart tables"
      materialized: table
      +schema: marts

vars:
  # Define any variables here
  raw_dataset: "retail_analytics_raw"
