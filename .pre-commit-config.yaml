repos:
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-json
        # Validates JSON syntax (catches errors in .json files)
      - id: check-toml
        # Validates TOML syntax (catches errors in pyproject.toml)
      - id: detect-private-key
        # 🔒 SECURITY: Prevents committing private keys, passwords, tokens
      - id: no-commit-to-branch
        args: ['--branch', 'main']
        # Prevents accidental commits to main branch (must use PR workflow)
